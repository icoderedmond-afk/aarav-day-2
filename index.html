<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minion Trivia Quiz - 20 Questions Edition!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background-color: #fce029; /* Minion Yellow */
            color: #2b5585; /* Minion Blue */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        #quiz-container {
            background: white;
            border: 5px solid #2b5585;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-top: 20px;
        }
        h1 { 
            color: #2b5585; 
            text-shadow: 2px 2px white;
            font-size: 2.3em;
            margin-bottom: 10px;
        }
        h2 {
            min-height: 60px;
            font-size: 1.2em;
        }
        .btn {
            background-color: #2b5585;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.1s, background-color 0.2s;
        }
        .btn:hover { 
            background-color: #1a3c63; 
            transform: scale(1.02); 
        }
        .option-btn {
            display: block;
            width: 85%;
            margin: 12px auto;
            background-color: #f0f0f0;
            color: #333;
            border: 2px solid #ccc;
        }
        .option-btn:hover:not(:disabled) { 
            background-color: #e0e0e0; 
            border-color: #2b5585;
        }
        .option-btn:disabled {
            cursor: not-allowed;
            transform: none;
        }
        .correct { 
            background-color: #4CAF50 !important; 
            color: white !important; 
            border-color: #2E7D32 !important;
        }
        .wrong { 
            background-color: #f44336 !important; 
            color: white !important; 
            border-color: #c62828 !important;
        }
        #score-board { 
            font-size: 20px; 
            font-weight: bold; 
            margin-bottom: 20px;
            background-color: #2b5585;
            color: white;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 20px;
        }
        #next-btn, #restart-btn { 
            display: none; 
            margin-top: 20px;
            background-color: #fce029;
            color: #2b5585;
            border: 2px solid #2b5585;
        }
        #next-btn:hover, #restart-btn:hover {
            background-color: #f1c40f;
        }
    </style>
</head>
<body>

<h1>🍌 Minion Trivia Quiz! 🍌</h1>
<div id="quiz-container">
    <div id="score-board">Question: <span id="q-num">0</span> / 20 | Score: <span id="score">0</span></div>
    <h2 id="question-text">Loading question...</h2>
    <div id="options-container"></div>
    <button id="next-btn" class="btn" onclick="nextQuestion()">Next Question ➡️</button>
    <button id="restart-btn" class="btn" onclick="startQuiz()">Play Again 🔄</button>
</div>

<script>
    // Pool of trivia questions
    const triviaQuestions = [
        { q: "What is the Minions' absolute favorite food?", options: ["Apples", "Bananas", "Pizza", "Ice Cream"], a: "Bananas" },
        { q: "What is the name of the supervillain the Minions serve?", options: ["Vector", "El Macho", "Gru", "Balthazar Bratt"], a: "Gru" },
        { q: "Which Minion has two different colored eyes (heterochromia)?", options: ["Kevin", "Stuart", "Bob", "Dave"], a: "Bob" },
        { q: "What color do Minions turn when they are mutated by the PX-41 serum?", options: ["Red", "Green", "Purple", "Black"], a: "Purple" },
        { q: "Which Minion is known for playing the guitar (and ukulele)?", options: ["Stuart", "Carl", "Jerry", "Phil"], a: "Stuart" },
        { q: "What language do the Minions speak?", options: ["Spanish", "Minionese", "French", "Esperanto"], a: "Minionese" },
        { q: "Which Minion briefly pulls Excalibur from the stone and becomes King of England?", options: ["Kevin", "Bob", "Stuart", "Tim"], a: "Bob" },
        { q: "Who created the Minions (the animation studio)?", options: ["Disney", "Pixar", "Illumination", "DreamWorks"], a: "Illumination" },
        { q: "What is the name of Gru's oldest adopted daughter?", options: ["Edith", "Agnes", "Margo", "Lucy"], a: "Margo" },
        { q: "What type of weapon does Gru famously use to steal the moon?", options: ["Freeze Ray", "Shrink Ray", "Laser Gun", "Fart Gun"], a: "Shrink Ray" },
        { q: "What do the Minions call Gru in 'Minions: The Rise of Gru'?", options: ["Boss", "Mini-Boss", "Master", "El Presidente"], a: "Mini-Boss" },
        { q: "Which Minion is the tallest of the main trio?", options: ["Kevin", "Stuart", "Bob", "Otto"], a: "Kevin" },
        { q: "What is Dr. Nefario's job?", options: ["Chef", "Pilot", "Evil Scientist", "Accountant"], a: "Evil Scientist" },
        { q: "In 'Despicable Me 2', what does Gru disguise himself as for Agnes's party?", options: ["A Fairy Princess", "A Minion", "A Pirate", "A Clown"], a: "A Fairy Princess" },
        { q: "What is Agnes' favorite animal?", options: ["Puppy", "Kitten", "Unicorn", "Pony"], a: "Unicorn" },
        { q: "What is the name of Bob's favorite teddy bear?", options: ["Teddy", "Tim", "Barnaby", "Fluffy"], a: "Tim" },
        { q: "Which Minion loses the Zodiac Stone to a kid wearing a pet rock in 'The Rise of Gru'?", options: ["Kevin", "Otto", "Stuart", "Bob"], a: "Otto" },
        { q: "What year did the original 'Despicable Me' movie release in theaters?", options: ["2008", "2010", "2012", "2015"], a: "2010" },
        { q: "What is the name of Gru's wife, introduced in 'Despicable Me 2'?", options: ["Scarlet", "Lucy", "Shannon", "Marlena"], a: "Lucy" },
        { q: "What is the name of the female supervillain in the 2015 'Minions' movie?", options: ["Scarlet Overkill", "Belle Bottom", "Madge Nelson", "Lucy Wilde"], a: "Scarlet Overkill" },
        { q: "What is the name of Scarlet Overkill's inventor husband?", options: ["Herb", "Walter", "Frank", "Steve"], a: "Herb" },
        { q: "What kind of pet does Gru own?", options: ["A Dragon", "A Kyle (Dog/Monster)", "A Crocodile", "A Bat"], a: "A Kyle (Dog/Monster)" },
        { q: "What is the Minion word for 'Thank You'?", options: ["Bello", "Tank yu", "Poopaye", "Tulaliloo"], a: "Tank yu" },
        { q: "What is the Minion word for 'Hello'?", options: ["Bello", "Poopaye", "Gelato", "Para tu"], a: "Bello" },
        { q: "What villain steals the moon with a shrink ray in the first film before Gru steals it back?", options: ["El Macho", "Vector", "Balthazar Bratt", "Wild Knuckles"], a: "Vector" },
        { q: "In 'Despicable Me 3', who is revealed to be Gru's long-lost twin brother?", options: ["Dru", "Cru", "Tru", "Lou"], a: "Dru" },
        { q: "What was Balthazar Bratt's famous catchphrase in 'Despicable Me 3'?", options: ["I've been a bad boy!", "Muahaha!", "Boom!", "Minion Power!"], a: "I've been a bad boy!" },
        { q: "What do Evil Minions have instead of neat yellow hair?", options: ["Spiky Purple Hair", "Green Dreadlocks", "Bald Heads", "No Hair"], a: "Spiky Purple Hair" },
        { q: "In 'Minions: The Rise of Gru', what group of villains does Gru try to join?", options: ["Vicious 6", "Sinister 6", "League of Villains", "Doom Patrol"], a: "Vicious 6" },
        { q: "What is the name of the youngest of the three adopted sisters?", options: ["Margo", "Edith", "Agnes", "Lucy"], a: "Agnes" }
    ];

    let currentQuestion = {};
    let score = 0;
    let askedQuestions = 0;
    let availableQuestions = [];
    const TOTAL_QUESTIONS = 20;

    function startQuiz() {
        score = 0;
        askedQuestions = 0;
        availableQuestions = [...triviaQuestions];
        
        document.getElementById('score').innerText = score;
        document.getElementById('q-num').innerText = askedQuestions;
        document.getElementById('restart-btn').style.display = 'none';
        document.getElementById('score-board').style.display = 'inline-block';
        
        nextQuestion();
    }

    function nextQuestion() {
        if (availableQuestions.length === 0 || askedQuestions >= TOTAL_QUESTIONS) {
            endQuiz();
            return;
        }

        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('options-container').innerHTML = '';
        
        const randomIndex = Math.floor(Math.random() * availableQuestions.length);
        currentQuestion = availableQuestions[randomIndex];
        
        availableQuestions.splice(randomIndex, 1);
        
        askedQuestions++;
        document.getElementById('q-num').innerText = askedQuestions;
        document.getElementById('question-text').innerText = `${askedQuestions}. ${currentQuestion.q}`;

        const shuffledOptions = [...currentQuestion.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.classList.add('btn', 'option-btn');
            btn.onclick = () => checkAnswer(opt, btn);
            document.getElementById('options-container').appendChild(btn);
        });
    }

    function checkAnswer(selectedOption, btn) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        if (selectedOption === currentQuestion.a) {
            btn.classList.add('correct');
            score++;
            document.getElementById('score').innerText = score;
        } else {
            btn.classList.add('wrong');
            buttons.forEach(b => {
                if (b.innerText === currentQuestion.a) {
                    b.classList.add('correct');
                }
            });
        }

        if (askedQuestions < TOTAL_QUESTIONS) {
            document.getElementById('next-btn').style.display = 'inline-block';
        } else {
            setTimeout(endQuiz, 1500);
        }
    }

    function endQuiz() {
        document.getElementById('question-text').innerText = "Quiz Complete! 🎉";
        
        let message = "";
        if (score === TOTAL_QUESTIONS) message = "PERFECT SCORE! You're a true Minion Master! 👑🍌";
        else if (score >= 15) message = "Great job! Here's a banana! 🍌";
        else if (score >= 10) message = "Not bad! Keep watching the movies! 🍿";
        else message = "Better luck next time! 😅";

        document.getElementById('options-container').innerHTML = `<h3>You scored ${score} out of ${TOTAL_QUESTIONS}!</h3><p>${message}</p>`;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('restart-btn').style.display = 'inline-block';
    }

    window.onload = startQuiz;
</script>
</body>
</html>
